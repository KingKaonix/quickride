<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QuickRide - Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>QuickRide</h1>
        <p>Reset your password</p>
      </div>
      <div class="alert" id="msg"></div>

      <!-- Step 1: Enter email -->
      <div id="step1">
        <p class="text-muted mb-2">Enter your email and answer your security question to reset your password.</p>
        <form onsubmit="lookup(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" class="form-input" required placeholder="you@email.com">
          </div>
          <button type="submit" class="btn btn-primary" id="lookup-btn">Continue</button>
        </form>
      </div>

      <!-- Step 2: Security question + new password -->
      <div id="step2" class="hidden">
        <div class="form-group">
          <label id="security-q">Security Question</label>
          <input type="text" id="security-a" class="form-input" required placeholder="Your answer">
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="new-password" class="form-input" required minlength="8" placeholder="Min 8 characters">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" class="form-input" required minlength="8" placeholder="Repeat password">
        </div>
        <button class="btn btn-primary" onclick="resetPassword()">Reset Password</button>
      </div>

      <!-- Step 3: Done -->
      <div id="step3" class="hidden">
        <div class="text-center" style="padding: 2rem 0;">
          <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
          <h2>Password Reset!</h2>
          <p class="text-muted mt-1">Your password has been updated.</p>
          <a href="/login" class="btn btn-primary mt-2">Sign In</a>
        </div>
      </div>

      <p class="text-center mt-2 text-muted">
        <a href="/login" class="link">← Back to sign in</a>
      </p>
    </div>
  </div>
  <script>
    let resetEmail = '';
    let resetToken = '';

    async function lookup(e) {
      e.preventDefault();
      const msgEl = document.getElementById('msg');
      const btn = document.getElementById('lookup-btn');
      msgEl.className = 'alert';
      btn.textContent = 'Looking up...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        resetEmail = data.email;
        resetToken = data.resetToken;
        document.getElementById('security-q').textContent = data.securityQuestion;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
      } catch (err) {
        msgEl.textContent = err.message;
        msgEl.className = 'alert alert-error';
        btn.textContent = 'Continue';
        btn.disabled = false;
      }
    }

    async function resetPassword() {
      const msgEl = document.getElementById('msg');
      const newPw = document.getElementById('new-password').value;
      const confirmPw = document.getElementById('confirm-password').value;
      const answer = document.getElementById('security-a').value;

      if (newPw !== confirmPw) {
        msgEl.textContent = 'Passwords do not match';
        msgEl.className = 'alert alert-error';
        return;
      }

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resetToken, email: resetEmail, securityAnswer: answer, newPassword: newPw })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
      } catch (err) {
        msgEl.textContent = err.message;
        msgEl.className = 'alert alert-error';
      }
    }
  </script>
</body>
</html>
