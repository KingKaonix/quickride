<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QuickRide - Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>QuickRide</h1>
        <p>Local services, one tap</p>
      </div>
      <div class="alert" id="error"></div>
      <form onsubmit="login(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" class="form-input" required placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-input" required placeholder="Your password" autocomplete="current-password">
        </div>
        <div class="text-right mb-2">
          <a href="/forgot-password" class="link" style="font-size:0.8125rem;">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Sign In</button>
      </form>
      <p class="text-center mt-2 text-muted">
        Don't have an account? <a href="/register" class="link">Sign up</a>
      </p>
    </div>
  </div>
  <script>
    async function login(e) {
      e.preventDefault();
      const errEl = document.getElementById('error');
      const btn = document.getElementById('submit-btn');
      errEl.className = 'alert';
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location = '/app';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.className = 'alert alert-error';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
