<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickRide - Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --blue: #2563eb; --dark: #0f172a; --gray: #64748b; --bg: #f8fafc; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.5rem; }
    .subtitle { text-align: center; color: var(--gray); margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 0.5rem; font-size: 0.875rem; }
    .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 0.875rem; }
    .form-group input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .btn { width: 100%; padding: 0.875rem; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #1d4ed8; }
    .error { background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.875rem; display: none; }
    .link { text-align: center; margin-top: 1rem; font-size: 0.875rem; color: var(--gray); }
    .link a { color: var(--blue); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Account</h1>
    <p class="subtitle">Join QuickRide today</p>
    <div class="error" id="error"></div>
    <form onsubmit="register(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="you@email.com">
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="tel" id="phone" placeholder="(555) 123-4567">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required minlength="8" placeholder="Min 8 characters">
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>
    <p class="link">Already have an account? <a href="/login">Sign in</a></p>
  </div>
  <script>
    async function register(e) {
      e.preventDefault();
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location = '/app';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
