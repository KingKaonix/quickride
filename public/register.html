<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QuickRide - Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>QuickRide</h1>
        <p>Create your account</p>
      </div>
      <div class="alert" id="error"></div>
      <form onsubmit="register(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" class="form-input" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" class="form-input" required placeholder="you@email.com">
        </div>
        <div class="form-group">
          <label>Phone <span class="text-muted">(optional)</span></label>
          <input type="tel" id="phone" class="form-input" placeholder="(555) 123-4567">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-input" required minlength="8" placeholder="Min 8 characters">
        </div>
        <div class="form-group">
          <label>Security Question</label>
          <select id="security-questionoption value=What is your favorite color?</option>
            <option value="What city were you born in?">What city were you born in?</option>
            <option value="What is your pet's name?">What is your pet's name?</option>
            <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
          </select>
        </div>
        <div class="form-group">
          <label>Security Answer</label>
          <input type="text" id="security-answer" class="form-input" required placeholder="Your answer">
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Create Account</button>
      </form>
      <p class="text-center mt-2 text-muted">
        Already have an account? <a href="/login" class="link">Sign in</a>
      </p>
    </div>
  </div>
  <script>
    async function register(e) {
      e.preventDefault();
      const errEl = document.getElementById('error');
      const btn = document.getElementById('submit-btn');
      errEl.className = 'alert';
      btn.textContent = 'Creating account...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            password: document.getElementById('password').value,
            securityQuestion: document.getElementById('security-question').value,
            securityAnswer: document.getElementById('security-answer').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location = '/app';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.className = 'alert alert-error';
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
