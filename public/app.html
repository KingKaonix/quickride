<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QuickRide</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="auth-wall" class="auth-page hidden">
    <div class="auth-card text-center">
      <div style="font-size:3rem; margin-bottom:1rem;">🚗</div>
      <h2 style="margin-bottom:0.5rem;">Welcome to QuickRide</h2>
      <p class="text-muted mb-2">Sign in to book local services</p>
      <a href="/login" class="btn btn-primary">Sign In</a>
      <a href="/register" class="btn btn-secondary mt-1">Create Account</a>
    </div>
  </div>

  <div id="app-shell" class="hidden">
    <div class="app-header">
      <h1>QuickRide</h1>
      <div class="user-badge">
        <div class="user-avatar" id="avatar"></div>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('services')">🏠 Services</div>
      <div class="tab" onclick="showTab('bookings')">📋 My Bookings</div>
    </div>

    <div class="content">
      <div id="services-panel"></div>
      <div id="bookings-panel" class="hidden"></div>
    </div>
  </div>

  <!-- Standard booking modal (rides, handyman, cleaning) -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2 id="modal-title">Book Service</h2>
      <div class="form-group">
        <label>Address / Location</label>
        <input type="text" id="booking-address" class="form-input" placeholder="Where do you need this?">
      </div>
      <div class="form-group">
        <label>Notes <span class="text-muted">(optional)</span></label>
        <textarea id="booking-notes" class="form-input" placeholder="Any details..." style="height:80px;resize:none;"></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitBooking()">Confirm Booking</button>
      <button class="btn btn-secondary mt-1" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <!-- Delivery booking modal -->
  <div class="modal-overlay" id="delivery-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>📦 Book Delivery</h2>
      <div class="form-group">
        <label>Pickup Address</label>
        <input type="text" id="pickup-address" class="form-input" placeholder="Where to pick up?">
      </div>
      <div class="form-group">
        <label>Delivery Address</label>
        <input type="text" id="delivery-address" class="form-input" placeholder="Where to deliver?">
      </div>
      <div class="form-group">
        <label>Contact Name</label>
        <input type="text" id="contact-name" class="form-input" placeholder="Who's receiving?">
      </div>
      <div class="form-group">
        <label>Contact Phone</label>
        <input type="tel" id="contact-phone" class="form-input" placeholder="(555) 123-4567">
      </div>
      <div class="form-group">
        <label>Special Instructions <span class="text-muted">(optional)</span></label>
        <textarea id="delivery-notes" class="form-input" placeholder="Fragile? Gate code? Leave at door?" style="height:80px;resize:none;"></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitDelivery()">Confirm Delivery</button>
      <button class="btn btn-secondary mt-1" onclick="closeDeliveryModal()">Cancel</button>
    </div>
  </div>

  <script>
    const API = window.location.origin + '/api';
    let token = localStorage.getItem('token');
    let user = JSON.parse(localStorage.getItem('user') || 'null');
    let selectedServiceId = null;

    const serviceIcons = { rideshare: '🚗', delivery: '📦', tasks: '🔧' };

    function getHeaders() {
      const h = { 'Content-Type': 'application/json' };
      if (token) h['Authorization'] = 'Bearer ' + token;
      return h;
    }

    function checkAuth() {
      if (!token || !user) {
        document.getElementById('auth-wall').classList.remove('hidden');
        document.getElementById('app-shell').classList.add('hidden');
        return false;
      }
      document.getElementById('auth-wall').classList.add('hidden');
      document.getElementById('app-shell').classList.remove('hidden');
      document.getElementById('avatar').textContent = user.name.charAt(0).toUpperCase();
      return true;
    }

    async function loadServices() {
      const res = await fetch(API + '/services');
      const services = await res.json();
      const panel = document.getElementById('services-panel');
      panel.innerHTML = '<h2 style="font-size:1.125rem;font-weight:700;margin-bottom:0.75rem;color:var(--gray-600);">Available Services</h2>' +
        services.map(s =>
          '<div class="service-card" onclick="openBooking(\'' + s.id + '\', \'' + s.name.replace(/'/g, "\\'") + '\', \'' + s.category + '\')">' +
          '<div class="service-icon">' + (serviceIcons[s.category] || '📋') + '</div>' +
          '<h3>' + s.name + '</h3>' +
          '<p>' + s.description + '</p>' +
          '<div class="service-price">$' + s.price.toFixed(2) + ' <span>' + (s.category === 'tasks' ? '/hr' : 'flat') + '</span></div>' +
          '</div>'
        ).join('');
    }

    async function loadBookings() {
      const res = await fetch(API + '/bookings', { headers: getHeaders() });
      if (res.status === 401) { logout(); return; }
      const bookings = await res.json();
      const panel = document.getElementById('bookings-panel');
      if (bookings.length === 0) {
        panel.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><h3>No bookings yet</h3><p>Book a service to get started</p></div>';
        return;
      }
      panel.innerHTML = '<h2 style="font-size:1.125rem;font-weight:700;margin-bottom:0.75rem;color:var(--gray-600);">Your Bookings</h2>' +
        bookings.map(b => {
          let details = '';
          if (b.category === 'delivery' && b.deliveryData) {
            details = '<p style="font-size:0.75rem;color:var(--gray-400);margin-top:0.25rem;">From: ' + b.deliveryData.pickup + ' → To: ' + b.deliveryData.delivery + '</p>' +
              '<p style="font-size:0.75rem;color:var(--gray-400);">Contact: ' + b.deliveryData.contactName + ' (' + b.deliveryData.contactPhone + ')</p>';
          }
          return '<div class="booking-card">' +
          '<div class="booking-header">' +
          '<div><h4>' + b.serviceName + '</h4><p>' + (b.address || b.notes || 'No details') + '</p>' + details + '</div>' +
          '<span class="badge badge-' + b.status + '">' + b.status + '</span>' +
          '</div>' +
          '<p style="font-weight:700;color:var(--blue);">$' + b.price.toFixed(2) + (b.category === 'tasks' ? '/hr' : '') + '</p>' +
          '</div>';
        }).join('');
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'services') || (i === 1 && tab === 'bookings'));
      });
      document.getElementById('services-panel').classList.toggle('hidden', tab !== 'services');
      document.getElementById('bookings-panel').classList.toggle('hidden', tab !== 'bookings');
      if (tab === 'bookings' && checkAuth()) loadBookings();
    }

    function openBooking(serviceId, serviceName, category) {
      if (!checkAuth()) return;
      if (category === 'delivery') {
        openDeliveryModal(serviceId);
        return;
      }
      selectedServiceId = serviceId;
      document.getElementById('modal-title').textContent = 'Book: ' + serviceName;
      document.getElementById('booking-address').value = '';
      document.getElementById('booking-notes').value = '';
      document.getElementById('modal').classList.add('active');
    }

    function openDeliveryModal(serviceId) {
      selectedServiceId = serviceId;
      document.getElementById('pickup-address').value = '';
      document.getElementById('delivery-address').value = '';
      document.getElementById('contact-name').value = user ? user.name : '';
      document.getElementById('contact-phone').value = user && user.phone ? user.phone : '';
      document.getElementById('delivery-notes').value = '';
      document.getElementById('delivery-modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); selectedServiceId = null; }
    function closeDeliveryModal() { document.getElementById('delivery-modal').classList.remove('active'); selectedServiceId = null; }

    async function submitBooking() {
      if (!selectedServiceId || !token) return;
      const address = document.getElementById('booking-address').value;
      const notes = document.getElementById('booking-notes').value;
      const res = await fetch(API + '/bookings', {
        method: 'POST', headers: getHeaders(),
        body: JSON.stringify({ serviceId: selectedServiceId, address, notes })
      });
      if (res.status === 401) { logout(); return; }
      closeModal();
      showTab('bookings');
    }

    async function submitDelivery() {
      if (!selectedServiceId || !token) return;
      const pickup = document.getElementById('pickup-address').value;
      const delivery = document.getElementById('delivery-address').value;
      const contactName = document.getElementById('contact-name').value;
      const contactPhone = document.getElementById('contact-phone').value;
      const notes = document.getElementById('delivery-notes').value;

      if (!pickup || !delivery || !contactName || !contactPhone) {
        alert('Please fill in all required fields');
        return;
      }

      const res = await fetch(API + '/bookings', {
        method: 'POST', headers: getHeaders(),
        body: JSON.stringify({
          serviceId: selectedServiceId,
          address: pickup + ' → ' + delivery,
          notes: notes,
          deliveryData: { pickup, delivery, contactName, contactPhone }
        })
      });
      if (res.status === 401) { logout(); return; }
      closeDeliveryModal();
      showTab('bookings');
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      token = null;
      user = null;
      window.location = '/login';
    }

    checkAuth();
    loadServices();
  </script>
</body>
</html>
